name: Build Cross-Platform Apps

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-web-and-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Verify Node version
        run: node -v
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
          
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
        
      - name: Build Web App
        run: npm run build
        
      - name: Sync Capacitor Android
        run: npx cap sync android
        
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: bdrailway-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Verify Node version
        run: node -v
          
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
        
      - name: Build Web App
        run: npm run build
        
      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Resolve Swift packages
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App

      - name: Build iOS App
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            clean build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Verify Node version
        run: node -v
          
      - name: Install Root Dependencies
        run: npm install --legacy-peer-deps
        
      - name: Build Web App
        run: npm run build
        
      - name: Sync Capacitor Electron
        run: npx cap sync @capacitor-community/electron
        
      - name: Install Electron Dependencies
        run: |
          cd electron
          npm install

      - name: Compile Electron TypeScript
        run: |
          cd electron
          npx tsc

      - name: Build Windows EXE
        run: |
          cd electron
          npx electron-builder build --win nsis -c ./electron-builder.config.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: bdrailway-windows-setup
          path: electron/dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Verify Node version
        run: node -v
          
      - name: Install Root Dependencies
        run: npm install --legacy-peer-deps
        
      - name: Build Web App
        run: npm run build
        
      - name: Sync Capacitor Electron
        run: npx cap sync @capacitor-community/electron
        
      - name: Install Electron Dependencies
        run: |
          cd electron
          npm install

      - name: Compile Electron TypeScript
        run: |
          cd electron
          npx tsc

      - name: Build Linux DEB
        run: |
          cd electron
          npx electron-builder build --linux deb -c ./electron-builder.config.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: bdrailway-linux-deb
          path: electron/dist/*.deb
